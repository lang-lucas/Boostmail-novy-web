<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BoostMail – Homepage exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --bm-blue: #1a5ada;
    --bm-blue-dark: #0f3fa0;
    --bm-blue-soft: #e8eefb;
    --bm-bg: #f4f4f4;
    --bm-ink: #0a0a0a;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f0eee9;
    color: var(--bm-ink);
    -webkit-font-smoothing: antialiased;
  }
  /* Each artboard is a self-contained "page". We scope styles per variant */
  .ab { width: 100%; height: 100%; overflow: hidden; }
  .ab-scroll { width: 100%; height: 100%; overflow-y: auto; }

  /* Common helpers used across variants */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-swiss.jsx"></script>
<script type="text/babel" src="v2-techsaas.jsx"></script>
<script type="text/babel" src="v3-playful.jsx"></script>
<script type="text/babel" src="v4-premium.jsx"></script>
<script type="text/babel" src="v5-motion.jsx"></script>
<script type="text/babel" src="v6-editorial.jsx"></script>
<script type="text/babel" src="v7-hybrid.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
